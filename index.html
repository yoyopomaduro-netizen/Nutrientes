<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NutriLent AI</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>

:root{
  --bg:#050505;
  --card:#0f0f0f;
  --accent:#b8f050;
  --text:#f2f2f2;
  --muted:#9aa0a6;
  --border:#1c1c1c;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'DM Sans',sans-serif;
  background:radial-gradient(circle at top,#111 0%,#050505 60%);
  color:var(--text);
}

/* HEADER */
.header{
  padding:50px 20px 20px;
  text-align:center;
}

.header h1{
  font-family:'Syne',sans-serif;
  font-size:40px;
  letter-spacing:-1px;
}

.header span{
  color:var(--accent);
}

.sub{
  margin-top:10px;
  color:var(--muted);
  font-size:14px;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:0 auto;
  padding:20px;
}

/* UPLOAD BOX */
.upload-box{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border:1px solid var(--border);
  border-radius:20px;
  padding:20px;
  text-align:center;
  transition:0.3s;
}

.upload-box:hover{
  border-color:var(--accent);
}

input[type="file"]{
  margin-top:10px;
  color:var(--muted);
}

.preview{
  width:100%;
  max-height:300px;
  object-fit:cover;
  border-radius:12px;
  margin-top:15px;
  display:none;
}

/* BUTTON */
button{
  margin-top:15px;
  padding:14px;
  width:100%;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:#000;
  font-weight:700;
  cursor:pointer;
  transition:0.25s;
  font-size:15px;
}

button:hover{
  transform:scale(1.02);
  box-shadow:0 0 20px rgba(184,240,80,0.3);
}

/* RESULT GRID */
.result{
  margin-top:30px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

/* CARDS */
.card{
  background:linear-gradient(145deg,#0f0f0f,#0a0a0a);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px;
  transition:0.3s;
}

.card:hover{
  border-color:var(--accent);
  transform:translateY(-3px);
}

.label{
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
}

.value{
  font-size:20px;
  font-weight:600;
}

/* LARGE CARD */
.big{
  font-size:28px;
  font-weight:700;
}

/* ERROR */
.error{
  color:#ff6b6b;
  margin-top:10px;
  font-size:14px;
}

/* LOADING */
.loading{
  margin-top:15px;
  color:var(--muted);
  font-size:14px;
}

</style>
</head>

<body>

<div class="header">
  <h1>NutriLent <span>AI</span></h1>
  <div class="sub">Analiza tu comida con inteligencia artificial</div>
</div>

<div class="container">

<div class="upload-box">

<input type="file" id="file" accept="image/*">

<img id="preview" class="preview"/>

<button onclick="analyze()">Analizar plato</button>

<div id="loading" class="loading"></div>
<div id="error" class="error"></div>

</div>

<div id="result" class="result" style="display:none">

<div class="card">
  <div class="label">Plato</div>
  <div class="big" id="dish"></div>
</div>

<div class="card">
  <div class="label">Ingredientes</div>
  <div id="ing"></div>
</div>

<div class="card">
  <div class="label">Calorías</div>
  <div class="big" id="cal"></div>
</div>

<div class="card">
  <div class="label">Macronutrientes</div>
  <div>🥩 Proteínas: <span id="prot"></span> g</div>
  <div>🌾 Carbos: <span id="carb"></span> g</div>
  <div>🫒 Grasas: <span id="fat"></span> g</div>
</div>

<div class="card">
  <div class="label">Consejo</div>
  <div id="adv"></div>
</div>

</div>

</div>

<script>

const WORKER_URL="https://nutrientes.yoyopomaduro.workers.dev";

let imageBase64=null;

/* preview */
document.getElementById("file").addEventListener("change",e=>{
  const file=e.target.files[0];
  if(!file)return;

  const reader=new FileReader();
  reader.onload=ev=>{
    imageBase64=ev.target.result;
    const img=document.getElementById("preview");
    img.src=imageBase64;
    img.style.display="block";
  };
  reader.readAsDataURL(file);
});

/* analyze */
async function analyze(){

  const errorBox=document.getElementById("error");
  const loading=document.getElementById("loading");

  errorBox.textContent="";
  loading.textContent="Procesando imagen...";

  if(!imageBase64){
    errorBox.textContent="Sube una imagen primero";
    loading.textContent="";
    return;
  }

  try{

    const base64=imageBase64.split(',')[1];

    const res=await fetch(WORKER_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        messages:[{
          role:"user",
          content:[
            {
              type:"image",
              source:{
                type:"base64",
                data:base64
              }
            },
            {
              type:"text",
              text:`Analiza esta comida y responde SOLO en JSON:
{
"plato":"",
"ingredientes":[],
"proteinas":0,
"carbos":0,
"grasas":0,
"calorias":0,
"consejo":""
}`
            }
          ]
        }]
      })
    });

    const data=await res.json();

    if(data.error){
      throw new Error(data.error);
    }

    if(!data.text){
      throw new Error("Sin respuesta");
    }

    let clean = data.text.replace(/```json|```/g,'').trim();
    let r = JSON.parse(clean);

    document.getElementById("result").style.display="grid";

    document.getElementById("dish").textContent=r.plato||"";
    document.getElementById("ing").textContent=(r.ingredientes||[]).join(", ");
    document.getElementById("cal").textContent=r.calorias||0;
    document.getElementById("prot").textContent=r.proteinas||0;
    document.getElementById("carb").textContent=r.carbos||0;
    document.getElementById("fat").textContent=r.grasas||0;
    document.getElementById("adv").textContent=r.consejo||"";

  }catch(err){
    errorBox.textContent="Error: "+err.message;
    console.error(err);
  }finally{
    loading.textContent="";
  }

}

</script>

</body>
</html>
