<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NutriLent AI</title>

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  text-align:center;
}
.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}
img{
  width:100%;
  border-radius:12px;
}
button{
  margin:10px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.primary{background:#b8f050;color:#000;}
.card{
  background:#141414;
  padding:20px;
  border-radius:12px;
  margin-top:15px;
  text-align:left;
}
.error{
  color:#ff6b6b;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>NutriLent AI</h2>

<input type="file" id="file" accept="image/*">

<img id="preview" style="display:none"/>

<br>

<button class="primary" onclick="analyze()">Analizar</button>

<div id="error" class="error"></div>

<div id="result" class="card" style="display:none">
  <h3 id="dish"></h3>
  <p><b>Ingredientes:</b> <span id="ing"></span></p>
  <p>🔥 <span id="cal"></span> kcal</p>
  <p>🥩 Proteínas: <span id="prot"></span> g</p>
  <p>🌾 Carbos: <span id="carb"></span> g</p>
  <p>🫒 Grasas: <span id="fat"></span> g</p>
  <p id="adv"></p>
</div>

</div>

<script>

const WORKER_URL = "https://nutrientes.yoyopomaduro.workers.dev/api/chat";

let imageBase64 = null;

// PREVIEW
document.getElementById("file").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = ev=>{
    imageBase64 = ev.target.result;
    const img = document.getElementById("preview");
    img.src = imageBase64;
    img.style.display = "block";
  };
  reader.readAsDataURL(file);
});


// ANALYZE
async function analyze(){

  const errorBox = document.getElementById("error");
  errorBox.textContent = "";

  if(!imageBase64){
    errorBox.textContent = "Sube una imagen primero";
    return;
  }

  try{

    const base64 = imageBase64.split(',')[1];

    const res = await fetch(WORKER_URL,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:600,
        messages:[{
          role:"user",
          content:[
            {
              type:"image",
              source:{
                type:"base64",
                media_type:"image/jpeg",
                data:base64
              }
            },
            {
              type:"text",
              text:`Analiza esta imagen de comida.

IMPORTANTE:
- Identifica el plato correctamente (no genérico)
- Lista ingredientes visibles
- Estima porción realista
- NO adivines cosas que no se ven

Responde SOLO en JSON:

{
  "plato": "nombre específico",
  "ingredientes": ["ingrediente1","ingrediente2"],
  "proteinas": numero,
  "carbos": numero,
  "grasas": numero,
  "calorias": numero,
  "consejo": "2 oraciones"
}`
            }
          ]
        }]
      })
    });

    const data = await res.json();

    // VALIDACIÓN PRO
    if (!data) throw new Error("Sin respuesta");
    if (data.error) throw new Error(data.error.message);
    if (!data.content || !Array.isArray(data.content)) {
      console.error(data);
      throw new Error("Respuesta inválida de IA");
    }

    let text = data.content
      .map(i => i?.text || '')
      .join('')
      .replace(/```json|```/g, '')
      .trim();

    if (!text) throw new Error("IA vacía");

    let r;
    try {
      r = JSON.parse(text);
    } catch(e){
      console.error(text);
      throw new Error("JSON inválido");
    }

    // MOSTRAR RESULTADO
    document.getElementById("result").style.display = "block";

    document.getElementById("dish").textContent = r.plato || "Desconocido";
    document.getElementById("ing").textContent = (r.ingredientes || []).join(", ");
    document.getElementById("cal").textContent = r.calorias || 0;
    document.getElementById("prot").textContent = r.proteinas || 0;
    document.getElementById("carb").textContent = r.carbos || 0;
    document.getElementById("fat").textContent = r.grasas || 0;
    document.getElementById("adv").textContent = r.consejo || "";

  }catch(err){
    errorBox.textContent = "Error: " + err.message;
  }

}

</script>

</body>
</html>
