<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NutriLent</title>
</head>
<body>

<div id="toast" class="toast"></div>

<script>
// ===== VARIABLES =====
let capturedImage = null;
let stream = null;
let facingMode = 'environment';

// ===== FUNCIONES BASE =====
function toast(msg, isErr=false){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' err' : '');
  setTimeout(()=>t.classList.add('on'),10);
  setTimeout(()=>t.classList.remove('on'),3000);
}

function switchTab(tab){
  console.log('Cambio de tab:', tab);
}

// ===== CÁMARA =====
async function openCamera(){
  try{
    if(stream) stopStream();
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode}});
    const v = document.getElementById('video-el');
    if(v){
      v.srcObject = stream;
      v.style.display = 'block';
    }
  }catch(e){
    toast('Error cámara', true);
  }
}

function stopStream(){
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
    stream = null;
  }
}

// ===== ARCHIVO =====
function loadFile(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = (ev) => {
    capturedImage = ev.target.result;
    stopStream();

    const img = document.getElementById('preview-img');
    if(img){
      img.src = capturedImage;
      img.style.display = 'block';
    }

    toast('Imagen cargada ✓');
  };

  reader.readAsDataURL(file);
}

// ===== ANALYSIS MOCK =====
async function analyze(){
  if(!capturedImage){
    toast('No hay imagen', true);
    return;
  }

  toast('Analizando...');

  setTimeout(()=>{
    toast('Análisis completado ✓');
  },1500);
}

</script>

</body>
</html>
