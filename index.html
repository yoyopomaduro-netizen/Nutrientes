<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NutriLent</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0b0b;
  color:white;
}
.tab-bar{
  display:flex;
  background:#111;
}
.tab{
  flex:1;
  padding:12px;
  text-align:center;
  cursor:pointer;
  color:#aaa;
}
.tab.active{
  color:#b8f050;
  background:#1a1a1a;
}
.screen{display:none;padding:20px;}
.screen.active{display:block;}
button{padding:10px;margin:5px;}
</style>

</head>
<body>

<div class="tab-bar">
  <div class="tab active" onclick="switchTab('scan')">Escanear</div>
  <div class="tab" onclick="switchTab('goals')">Metas</div>
  <div class="tab" onclick="switchTab('history')">Historial</div>
</div>

<div id="screen-scan" class="screen active">
  <h2>Escanear</h2>
  <button onclick="openCamera()">Abrir cámara</button>
  <button onclick="document.getElementById('file').click()">Subir imagen</button>
  <input type="file" id="file" accept="image/*" style="display:none" onchange="loadFile(event)">
  <br><br>
  <img id="preview" style="max-width:100%;display:none"/>
  <br>
  <button onclick="analyze()">Analizar</button>
</div>

<div id="screen-goals" class="screen">
  <h2>Metas</h2>
  <input id="name" placeholder="Nombre"><br>
  <input id="weight" placeholder="Peso"><br>
  <button onclick="saveGoals()">Guardar</button>
</div>

<div id="screen-history" class="screen">
  <h2>Historial</h2>
  <div id="history"></div>
</div>

<script>
let capturedImage=null;
let history=[];

/* ---------- TABS ---------- */
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['scan','goals','history'][i]===tab);
  });

  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
}

/* ---------- CÁMARA (simple) ---------- */
function openCamera(){
  alert("Cámara no implementada en esta versión básica");
}

/* ---------- CARGAR IMAGEN ---------- */
function loadFile(e){
  const file=e.target.files[0];
  if(!file) return;

  const reader=new FileReader();

  reader.onload=function(ev){
    capturedImage=ev.target.result;

    const img=document.getElementById('preview');
    img.src=capturedImage;
    img.style.display='block';
  };

  reader.readAsDataURL(file);
}

/* ---------- ANALIZAR (mock) ---------- */
function analyze(){
  if(!capturedImage){
    alert("Carga una imagen primero");
    return;
  }

  const result={
    plato:"Plato detectado",
    calorias:500
  };

  history.unshift(result);
  renderHistory();

  alert("Análisis listo (demo)");
}

/* ---------- GUARDAR METAS ---------- */
function saveGoals(){
  const data={
    name:document.getElementById('name').value,
    weight:document.getElementById('weight').value
  };

  localStorage.setItem('goals',JSON.stringify(data));
  alert("Guardado");
}

/* ---------- HISTORIAL ---------- */
function renderHistory(){
  const container=document.getElementById('history');

  if(history.length===0){
    container.innerHTML="Sin datos";
    return;
  }

  container.innerHTML=history.map(h=>`
    <div style="margin:10px 0;padding:10px;background:#111">
      ${h.plato} - ${h.calorias} kcal
    </div>
  `).join('');
}
</script>

</body>
</html>
